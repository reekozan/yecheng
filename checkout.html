<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | YÈCHÉNG 夜城</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="images/favicon4.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>

    <div class="logo">

        <h1>YÈCHÉNG 夜城</h1>

    </div>

    <nav>

        <ul>

            <li><a href="index.html"
            data-pt="Início"
            data-en="Home">Início</a></li>

            <li><a href="index.html#colecoes"
            data-pt="Coleções"
            data-en="Collections">Coleções</a></li>

            <li><a href="index.html#novidades"
            data-pt="Novidades"
            data-en="New Arrivals">Novidades</a></li>
            
            <li><a href="index.html#limited"Limited></a></li>

            <li><a href="index.html#sobre"
            data-pt="Sobre"
            data-en="About">Sobre</a></li>

            <li><a href="index.html#contato"
            data-pt="Contato"
            data-en="Contact">Contato</a></li>

        </ul>

    </nav>

    <div class="header-actions">

        <button id="idioma">

            PT | EN

        </button>

        <span class="cart">

            🛒

        </span>

    </div>

</header>

<main>

    <section class="checkout">

        <h2
        data-pt="Finalizar Pedido"
        data-en="Checkout">

        Finalizar Pedido

        </h2>

        <form class="checkout-form">

            <div class="campo">

                <label
                data-pt="Nome"
                data-en="First Name">

                Nome

                </label>

                <input type="text" required>

            </div>

            <div class="campo">

                <label
                data-pt="Sobrenome"
                data-en="Last Name">

                Sobrenome

                </label>

                <input type="text" required>

            </div>

            <div class="campo">

                <label>E-mail</label>

                <input type="email" required>

            </div>

            <div class="campo">

                <label
                data-pt="Telefone"
                data-en="Phone">

                Telefone

                </label>

                <input type="tel">

            </div>

            <div class="campo">

                <label
                data-pt="Cidade"
                data-en="City">

                Cidade

                </label>

                <input type="text">

            </div>

            <div class="campo">

                <label
                data-pt="País"
                data-en="Country">

                País

                </label>

                <select>

                    <option>US</option>
                    <option>BR</option>
                    <option>FR</option>
                    <option>IT</option>
                    <option>DE</option>

                </select>

            </div>

            <div class="campo">

                <label
                data-pt="Tamanho"
                data-en="Size">

                Tamanho

                </label>

                <select>

                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                    <option>XL</option>

                </select>

            </div>

            <div class="campo campo-completo">

                <label
                data-pt="Observações"
                data-en="Notes">

                Observações

                </label>

                <textarea rows="5"></textarea>

            </div>

            <button
            type="submit"
            class="btn"

            data-pt="Finalizar Pedido"
            data-en="Place Order">

            Finalizar Pedido

            </button>

        </form>

    </section>

</main>

<footer>

    <h3>YÈCHÉNG 夜城</h3>

    <p>

        OWN THE NIGHT

    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
